<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Vehículo - Pepsico Funza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 20px;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo-container img {
            width: 150px;
            height: auto;
        }
        
        h2 {
            text-align: center;
            color: #C76E00;
            margin-bottom: 25px;
        }
        
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input[type="radio"] {
            width: 18px;
            height: 18px;
        }
        
        .btn-submit {
            background-color: #001855;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .btn-submit:hover {
            background-color: #0056b3;
        }
        
        .back-button {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #001855;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        
        .back-button:hover {
            text-decoration: underline;
        }
        
        .vehicle-info {
            background: #e9f7fe;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c6e0f5;
        }
        
        .required::after {
            content: " *";
            color: #ff0000;
        }
        
        .section-title {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #555;
        }
        
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            display: none;
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            display: none;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="prueba.png" alt="Logo de la Empresa">
    </div>
    
    <h2>INSPECCIÓN DE VEHÍCULO</h2>
    
    <div class="form-container">
        <div class="success-message" id="success-message">
            ✅ Inspección guardada correctamente
        </div>
        
        <div class="error-message" id="error-message">
            ❌ Error al guardar los datos
        </div>
        
        <div class="vehicle-info">
            <h3 id="vehicle-title">Vehículo #<span id="vehicle-number">1</span></h3>
            <p>Complete los datos de inspección para este vehículo</p>
        </div>
        
        <form id="details-form">
            <div class="section-title">ESTADO DE LA CARPA</div>
            <div class="form-group">
                <label for="estado_carpa" class="required">Estado de la carpa</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="estado_bueno" name="estado_carpa" value="BUENO">
                        <label for="estado_bueno">BUENO</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="estado_malo" name="estado_carpa" value="MALO">
                        <label for="estado_malo">MALO</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="carpa_limpia" class="required">Carpa limpia</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="carpa_si" name="carpa_limpia" value="SI">
                        <label for="carpa_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="carpa_no" name="carpa_limpia" value="NO">
                        <label for="carpa_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="section-title">ESTADO DE ESTIBAS</div>
            <div class="form-group">
                <label for="estibas" class="required">Estibas</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="estibas_si" name="estibas" value="SI">
                        <label for="estibas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="estibas_no" name="estibas" value="NO">
                        <label for="estibas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="estibas_estado" class="required">Estibas en buen estado</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="estibas_buenas_si" name="estibas_estado" value="SI">
                        <label for="estibas_buenas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="estibas_buenas_no" name="estibas_estado" value="NO">
                        <label for="estibas_buenas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="section-title">ESTADO DE CANASTILLAS</div>
            <div class="form-group">
                <label for="canastillas" class="required">Canastillas</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="canastillas_si" name="canastillas" value="SI">
                        <label for="canastillas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="canastillas_no" name="canastillas" value="NO">
                        <label for="canastillas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="canastillas_estado" class="required">Canastillas en buen estado</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="canastillas_buenas_si" name="canastillas_estado" value="SI">
                        <label for="canastillas_buenas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="canastillas_buenas_no" name="canastillas_estado" value="NO">
                        <label for="canastillas_buenas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="section-title">VINIPEL</div>
            <div class="form-group">
                <label for="vinipel" class="required">Vinipel</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="vinipel_si" name="vinipel" value="SI">
                        <label for="vinipel_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="vinipel_no" name="vinipel" value="NO">
                        <label for="vinipel_no">NO</label>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">GUARDAR INSPECCIÓN</button>
        </form>
        
        <a href="index.html" class="back-button">← Volver al Formulario Principal</a>
    </div>
    
    <script>
        let vehicleIndex = null;
        
        // ============================================
        // SISTEMA DE ALMACENAMIENTO MULTIPLE (SessionStorage + Cookie fallback)
        // ============================================
        const StorageManager = {
            // Intentar guardar en sessionStorage, si falla usar cookies
            setItem: function(key, value) {
                try {
                    sessionStorage.setItem(key, value);
                    console.log('✅ Guardado en sessionStorage:', key);
                    return true;
                } catch (e) {
                    console.warn('⚠️ sessionStorage falló, usando cookies...');
                    this.setCookie(key, value);
                    return true;
                }
            },
            
            // Intentar obtener de sessionStorage, si falla buscar en cookies
            getItem: function(key) {
                try {
                    const value = sessionStorage.getItem(key);
                    if (value) {
                        console.log('✅ Obtenido de sessionStorage:', key);
                        return value;
                    }
                } catch (e) {
                    console.warn('⚠️ sessionStorage no disponible');
                }
                
                // Fallback a cookies
                return this.getCookie(key);
            },
            
            // Eliminar de sessionStorage y cookies
            removeItem: function(key) {
                try {
                    sessionStorage.removeItem(key);
                } catch (e) {}
                this.deleteCookie(key);
            },
            
            // Cookies fallback
            setCookie: function(name, value, days = 365) {
                const expires = new Date(Date.now() + days * 864e5).toUTCString();
                document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
            },
            
            getCookie: function(name) {
                return document.cookie.split('; ').reduce((r, v) => {
                    const parts = v.split('=');
                    return parts[0] === name ? decodeURIComponent(parts[1]) : r;
                }, '');
            },
            
            deleteCookie: function(name) {
                document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:01 GMT; path=/;';
            }
        };
        
        // ============================================
        // OBTENER ÍNDICE DEL VEHÍCULO DESDE LA URL
        // ============================================
        function getVehicleIndex() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('vehicle')) || 0;
        }
        
        // ============================================
        // GUARDAR DATOS DEL VEHÍCULO
        // ============================================
        function guardarDetallesVehiculo(vehicleIndex, detalles) {
            try {
                // Obtener datos existentes de index.html
                let mainData = StorageManager.getItem('pepsico_data');
                let data = {};
                
                if (mainData) {
                    data = JSON.parse(mainData);
                }
                
                // Guardar los detalles del vehículo específico
                const detallesKey = `vehiculo_${vehicleIndex}_detalles`;
                data[detallesKey] = JSON.stringify(detalles);
                
                // Guardar de vuelta
                StorageManager.setItem('pepsico_data', JSON.stringify(data));
                
                console.log('✅ Detalles guardados:', detallesKey);
                return true;
            } catch (error) {
                console.error('❌ Error al guardar:', error);
                return false;
            }
        }
        
        // ============================================
        // CARGAR DATOS DEL VEHÍCULO
        // ============================================
        function cargarDetallesVehiculo(vehicleIndex) {
            try {
                const mainData = StorageManager.getItem('pepsico_data');
                
                if (!mainData) {
                    console.log('ℹ️ No hay datos guardados');
                    return null;
                }
                
                const data = JSON.parse(mainData);
                const detallesKey = `vehiculo_${vehicleIndex}_detalles`;
                
                if (data[detallesKey]) {
                    const detalles = JSON.parse(data[detallesKey]);
                    console.log('✅ Detalles cargados:', detalles);
                    return detalles;
                } else {
                    console.log('ℹ️ No hay detalles para este vehículo');
                    return null;
                }
            } catch (error) {
                console.error('❌ Error al cargar:', error);
                return null;
            }
        }
        
        // ============================================
        // CARGAR DATOS GUARDADOS SI EXISTEN
        // ============================================
        function cargarDatosGuardados() {
            const detalles = cargarDetallesVehiculo(vehicleIndex);
            
            if (detalles) {
                // Rellenar los campos con los datos guardados
                if (detalles.estado_carpa) {
                    document.querySelector(`input[name="estado_carpa"][value="${detalles.estado_carpa}"]`).checked = true;
                }
                if (detalles.carpa_limpia) {
                    document.querySelector(`input[name="carpa_limpia"][value="${detalles.carpa_limpia}"]`).checked = true;
                }
                if (detalles.estibas) {
                    document.querySelector(`input[name="estibas"][value="${detalles.estibas}"]`).checked = true;
                }
                if (detalles.estibas_estado) {
                    document.querySelector(`input[name="estibas_estado"][value="${detalles.estibas_estado}"]`).checked = true;
                }
                if (detalles.canastillas) {
                    document.querySelector(`input[name="canastillas"][value="${detalles.canastillas}"]`).checked = true;
                }
                if (detalles.canastillas_estado) {
                    document.querySelector(`input[name="canastillas_estado"][value="${detalles.canastillas_estado}"]`).checked = true;
                }
                if (detalles.vinipel) {
                    document.querySelector(`input[name="vinipel"][value="${detalles.vinipel}"]`).checked = true;
                }
                
                console.log('✅ Datos cargados correctamente');
                showSuccess('Datos cargados correctamente');
            } else {
                console.log('ℹ️ No se encontraron detalles');
            }
        }
        
        // ============================================
        // GUARDAR AUTOMÁTICAMENTE AL SELECCIONAR
        // ============================================
        function autoSave() {
            const campos = [
                'estado_carpa', 'carpa_limpia', 'estibas', 
                'estibas_estado', 'canastillas', 'canastillas_estado', 'vinipel'
            ];
            
            const detalles = {};
            let todosSeleccionados = true;
            
            for (let campo of campos) {
                const seleccionado = document.querySelector(`input[name="${campo}"]:checked`);
                if (seleccionado) {
                    detalles[campo] = seleccionado.value;
                } else {
                    todosSeleccionados = false;
                }
            }
            
            if (todosSeleccionados) {
                guardarDetallesVehiculo(vehicleIndex, detalles);
            }
        }
        
        // ============================================
        // GUARDAR DATOS AL ENVIAR EL FORMULARIO
        // ============================================
        document.getElementById('details-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validar que todos los campos estén seleccionados
            const campos = [
                'estado_carpa', 'carpa_limpia', 'estibas', 
                'estibas_estado', 'canastillas', 'canastillas_estado', 'vinipel'
            ];
            
            for (let campo of campos) {
                const seleccionado = document.querySelector(`input[name="${campo}"]:checked`);
                if (!seleccionado) {
                    showError(`Por favor, seleccione una opción para "${campo.replace('_', ' ')}"`);
                    return;
                }
            }
            
            // Obtener los valores seleccionados
            const detalles = {
                estado_carpa: document.querySelector('input[name="estado_carpa"]:checked').value,
                carpa_limpia: document.querySelector('input[name="carpa_limpia"]:checked').value,
                estibas: document.querySelector('input[name="estibas"]:checked').value,
                estibas_estado: document.querySelector('input[name="estibas_estado"]:checked').value,
                canastillas: document.querySelector('input[name="canastillas"]:checked').value,
                canastillas_estado: document.querySelector('input[name="canastillas_estado"]:checked').value,
                vinipel: document.querySelector('input[name="vinipel"]:checked').value
            };
            
            console.log('💾 Guardando detalles:', detalles);
            
            // Guardar en almacenamiento
            const guardado = guardarDetallesVehiculo(vehicleIndex, detalles);
            
            if (guardado) {
                showSuccess('✅ Inspección guardada correctamente');
                
                // Esperar un momento antes de redirigir
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showError('❌ Error al guardar. Por favor, inténtelo de nuevo.');
            }
        });
        
        // ============================================
        // FUNCIONES DE MENSAJES
        // ============================================
        function showSuccess(message) {
            const successMsg = document.getElementById('success-message');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('error-message');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }
        
        // ============================================
        // INICIALIZACIÓN AL CARGAR LA PÁGINA
        // ============================================
        window.addEventListener('DOMContentLoaded', function() {
            vehicleIndex = getVehicleIndex();
            document.getElementById('vehicle-number').textContent = vehicleIndex + 1;
            document.getElementById('vehicle-title').textContent = `Vehículo #${vehicleIndex + 1}`;
            
            console.log('🚗 Iniciando formulario para vehículo:', vehicleIndex);
            
            // Cargar datos guardados
            cargarDatosGuardados();
            
            // Auto-guardar al cambiar cualquier opción
            const radios = document.querySelectorAll('input[type="radio"]');
            radios.forEach(radio => {
                radio.addEventListener('change', autoSave);
            });
            
            // Verificar disponibilidad de almacenamiento
            console.log('📊 sessionStorage disponible:', typeof sessionStorage !== 'undefined');
            console.log('🍪 Cookies disponibles:', navigator.cookieEnabled);
        });
    </script>
</body>
</html>
