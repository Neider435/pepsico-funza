<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Vehículo - Pepsico Funza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 20px;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo-container img {
            width: 150px;
            height: auto;
        }
        
        h2 {
            text-align: center;
            color: #C76E00;
            margin-bottom: 25px;
        }
        
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input[type="radio"] {
            width: 18px;
            height: 18px;
        }
        
        .btn-submit {
            background-color: #001855;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .btn-submit:hover {
            background-color: #0056b3;
        }
        
        .back-button {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #001855;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        
        .back-button:hover {
            text-decoration: underline;
        }
        
        .vehicle-info {
            background: #e9f7fe;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c6e0f5;
        }
        
        .required::after {
            content: " *";
            color: #ff0000;
        }
        
        .section-title {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #555;
        }
        
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            display: none;
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            display: none;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="prueba.png" alt="Logo de la Empresa">
    </div>
    
    <h2>INSPECCIÓN DE VEHÍCULO</h2>
    
    <div class="form-container">
        <div class="success-message" id="success-message">
            ✅ Inspección guardada correctamente
        </div>
        
        <div class="error-message" id="error-message">
            ❌ Error al guardar los datos
        </div>
        
        <div class="vehicle-info">
            <h3 id="vehicle-title">Vehículo #<span id="vehicle-number">1</span></h3>
            <p>Complete los datos de inspección para este vehículo</p>
        </div>
        
        <form id="details-form">
            <div class="section-title">ESTADO DE LA CARPA</div>
            <div class="form-group">
                <label for="estado_carpa" class="required">Estado de la carpa</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="estado_bueno" name="estado_carpa" value="BUENO">
                        <label for="estado_bueno">BUENO</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="estado_malo" name="estado_carpa" value="MALO">
                        <label for="estado_malo">MALO</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="carpa_limpia" class="required">Carpa limpia</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="carpa_si" name="carpa_limpia" value="SI">
                        <label for="carpa_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="carpa_no" name="carpa_limpia" value="NO">
                        <label for="carpa_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="section-title">ESTADO DE ESTIBAS</div>
            <div class="form-group">
                <label for="estibas" class="required">Estibas</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="estibas_si" name="estibas" value="SI">
                        <label for="estibas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="estibas_no" name="estibas" value="NO">
                        <label for="estibas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="estibas_estado" class="required">Estibas en buen estado</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="estibas_buenas_si" name="estibas_estado" value="SI">
                        <label for="estibas_buenas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="estibas_buenas_no" name="estibas_estado" value="NO">
                        <label for="estibas_buenas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="section-title">ESTADO DE CANASTILLAS</div>
            <div class="form-group">
                <label for="canastillas" class="required">Canastillas</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="canastillas_si" name="canastillas" value="SI">
                        <label for="canastillas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="canastillas_no" name="canastillas" value="NO">
                        <label for="canastillas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="canastillas_estado" class="required">Canastillas en buen estado</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="canastillas_buenas_si" name="canastillas_estado" value="SI">
                        <label for="canastillas_buenas_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="canastillas_buenas_no" name="canastillas_estado" value="NO">
                        <label for="canastillas_buenas_no">NO</label>
                    </div>
                </div>
            </div>
            
            <div class="section-title">VINIPEL</div>
            <div class="form-group">
                <label for="vinipel" class="required">Vinipel</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="vinipel_si" name="vinipel" value="SI">
                        <label for="vinipel_si">SI</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="vinipel_no" name="vinipel" value="NO">
                        <label for="vinipel_no">NO</label>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">GUARDAR INSPECCIÓN</button>
        </form>
        
        <a href="index.html" class="back-button">← Volver al Formulario Principal</a>
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 3;">Enviar</button>
            <button type="button" class="btn-borrar-todo" style="flex: 1;" onclick="limpiarTodo()">Borrar Todo</button>
        </div>
    </div>
    
    <script>
        let vehicleIndex = null;
        
        // ============================================
        // MANEJADOR DE ALMACENAMIENTO (sessionStorage para Netlify)
        // ============================================
        const Storage = {
            // sessionStorage es más confiable en Netlify para flujos de formulario
            setItem: function(key, value) {
                try {
                    sessionStorage.setItem(key, value);
                    return true;
                } catch (e) {
                    console.error('❌ Error sessionStorage:', e);
                    return false;
                }
            },
            
            getItem: function(key) {
                try {
                    return sessionStorage.getItem(key);
                } catch (e) {
                    console.error('❌ Error sessionStorage:', e);
                    return null;
                }
            }
        };
        
        // ============================================
        // OBTENER ÍNDICE DEL VEHÍCULO DESDE LA URL
        // ============================================
        function getVehicleIndex() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('vehicle')) || 0;
        }
        
        // ============================================
        // GUARDAR DETALLES DEL VEHÍCULO
        // ============================================
        function guardarDetalles(vehicleIndex, detalles) {
            try {
                // Obtener datos existentes del formulario principal
                let mainData = Storage.getItem('pepsico_data');
                let data = mainData ? JSON.parse(mainData) : {};
                
                // Guardar detalles del vehículo específico
                const key = `vehiculo_${vehicleIndex}_detalles`;
                data[key] = JSON.stringify(detalles);
                
                // Guardar todo de vuelta
                Storage.setItem('pepsico_data', JSON.stringify(data));
                
                console.log('✅ Detalles guardados:', key);
                return true;
            } catch (error) {
                console.error('❌ Error al guardar:', error);
                return false;
            }
        }
        
        // ============================================
        // CARGAR DETALLES DEL VEHÍCULO
        // ============================================
        function cargarDetalles(vehicleIndex) {
            try {
                const mainData = Storage.getItem('pepsico_data');
                if (!mainData) return null;
                
                const data = JSON.parse(mainData);
                const key = `vehiculo_${vehicleIndex}_detalles`;
                
                return data[key] ? JSON.parse(data[key]) : null;
            } catch (error) {
                console.error('❌ Error al cargar:', error);
                return null;
            }
        }
        
        // ============================================
        // CARGAR DATOS AL INICIAR
        // ============================================
        function cargarDatosGuardados() {
            const detalles = cargarDetalles(vehicleIndex);
            
            if (detalles) {
                // Rellenar campos
                ['estado_carpa', 'carpa_limpia', 'estibas', 'estibas_estado', 'canastillas', 'canastillas_estado', 'vinipel'].forEach(campo => {
                    if (detalles[campo]) {
                        const input = document.querySelector(`input[name="${campo}"][value="${detalles[campo]}"]`);
                        if (input) input.checked = true;
                    }
                });
                
                showSuccess('✅ Datos cargados correctamente');
            }
        }
        
        // ============================================
        // FORMULARIO - ENVIAR
        // ============================================
        document.getElementById('details-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validar todos los campos
            const campos = ['estado_carpa', 'carpa_limpia', 'estibas', 'estibas_estado', 'canastillas', 'canastillas_estado', 'vinipel'];
            const errores = [];
            
            campos.forEach(campo => {
                if (!document.querySelector(`input[name="${campo}"]:checked`)) {
                    errores.push(campo.replace('_', ' '));
                }
            });
            
            if (errores.length > 0) {
                showError(`⚠️ Complete todos los campos: ${errores.join(', ')}`);
                return;
            }
            
            // Obtener valores
            const detalles = {};
            campos.forEach(campo => {
                detalles[campo] = document.querySelector(`input[name="${campo}"]:checked`).value;
            });
            
            // Guardar
            if (guardarDetalles(vehicleIndex, detalles)) {
                showSuccess('✅ Inspección guardada correctamente');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showError('❌ Error al guardar. Intente nuevamente.');
            }
        });
        
        // ============================================
        // MENSAJES
        // ============================================
        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }
        
        // ============================================
        // INICIALIZAR
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            vehicleIndex = getVehicleIndex();
            document.getElementById('vehicle-number').textContent = vehicleIndex + 1;
            document.getElementById('vehicle-title').textContent = `Vehículo #${vehicleIndex + 1}`;
            
            console.log('🚗 Vehículo:', vehicleIndex);
            
            // Cargar datos existentes
            cargarDatosGuardados();
            
            // Guardar automáticamente al cambiar opciones
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    const campos = ['estado_carpa', 'carpa_limpia', 'estibas', 'estibas_estado', 'canastillas', 'canastillas_estado', 'vinipel'];
                    const detalles = {};
                    let completado = true;
                    
                    campos.forEach(campo => {
                        const sel = document.querySelector(`input[name="${campo}"]:checked`);
                        if (sel) detalles[campo] = sel.value;
                        else completado = false;
                    });
                    
                    if (completado) {
                        guardarDetalles(vehicleIndex, detalles);
                        console.log('💾 Auto-guardado');
                    }
                });
            });
            
            // Verificar sessionStorage
            try {
                sessionStorage.setItem('netlify_test', 'ok');
                sessionStorage.removeItem('netlify_test');
                console.log('✅ sessionStorage disponible en Netlify');
            } catch (e) {
                console.error('❌ sessionStorage bloqueado:', e);
                alert('⚠️ El navegador bloquea el almacenamiento. Permita cookies para este sitio.');
            }
        });
    </script>
</body>
</html>
